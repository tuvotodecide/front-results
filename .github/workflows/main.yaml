name: CI & CD

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - "tests/**"
      - "cypress/**"
      - "cypress.config.ts"
      - "middleware.ts"
      - "eslint.config.js"
      - "next.config.ts"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - "tests/**"
      - "cypress/**"
      - "cypress.config.ts"
      - "middleware.ts"
      - "eslint.config.js"
      - "next.config.ts"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - ".github/workflows/**"

env:
  BUILD_PLATFORMS: linux/amd64

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    environment: devops_aws
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPO: ${{ vars.ECR_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select env & image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "▶️ Build in PROD"
            echo "${{ vars.ENV_PROD }}" > .env
            echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "alias_tag=prod" >> $GITHUB_OUTPUT
          else
            echo "▶️ Build in DEV"
            echo "${{ vars.ENV_DEV }}" > .env
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "alias_tag=dev" >> $GITHUB_OUTPUT
          fi
          echo "⎿ wrote .env with tag: $(cat $GITHUB_OUTPUT)"

      - name: Set up QEMU (binfmt)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:v0.12.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ env.BUILD_PLATFORMS }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.alias_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.alias_tag }}
          cache-to: type=inline

  deploy-dev:
    name: Deploy to Hetzner (dev) via SSH
    needs: build
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: devops_aws
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPO: ${{ vars.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      PUBLIC_IP: ${{ vars.PUBLIC_IP }}
      EXTERNAL_PORT: ${{ vars.EXTERNAL_PORT_DEV }}
      CONTAINER_NAME: yocustodio-app-dev
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ vars.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy container via SSH
        shell: bash
        run: |
          set -euo pipefail
          ECR_TOKEN=$(aws ecr get-login-password --region "${{ env.AWS_REGION }}")
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" bash -s << ENDSSH
          set -euo pipefail
          echo "${ECR_TOKEN}" | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          docker pull --quiet "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          docker run -d \\
            --name ${{ env.CONTAINER_NAME }} \\
            -p "${{ env.EXTERNAL_PORT }}:3000" \\
            --restart unless-stopped \\
            "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker network connect results-net ${{ env.CONTAINER_NAME }} || true
          docker image prune -f
          ENDSSH

      - name: Health check loop
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking http://${PUBLIC_IP}:${EXTERNAL_PORT}/votacion"
          for i in {1..24}; do
            http_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://${PUBLIC_IP}:${EXTERNAL_PORT}/votacion") || true
            if [[ "${http_code:-}" == "200" ]]; then
              echo "Service OK (${http_code})"
              exit 0
            fi
            echo "Retry $i/24 - code=${http_code:-timeout}"
            sleep 5
          done
          echo "Health-check failed, dumping container logs"
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" \
            "docker logs --tail 200 ${{ env.CONTAINER_NAME }}"
          exit 1

  deploy-prod:
    name: Deploy to Hetzner (prod) via SSH
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: devops_aws
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPO: ${{ vars.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      PUBLIC_IP: ${{ vars.PUBLIC_IP }}
      EXTERNAL_PORT: ${{ vars.EXTERNAL_PORT }}
      CONTAINER_NAME: yocustodio-app
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ vars.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy container via SSH
        shell: bash
        run: |
          set -euo pipefail
          ECR_TOKEN=$(aws ecr get-login-password --region "${{ env.AWS_REGION }}")
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" bash -s << ENDSSH
          set -euo pipefail
          echo "${ECR_TOKEN}" | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          docker pull --quiet "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          docker run -d \\
            --name ${{ env.CONTAINER_NAME }} \\
            -p "${{ env.EXTERNAL_PORT }}:3000" \\
            --restart unless-stopped \\
            "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker network connect results-net ${{ env.CONTAINER_NAME }} || true
          docker image prune -f
          ENDSSH

      - name: Health check loop
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking http://${PUBLIC_IP}:${EXTERNAL_PORT}/votacion"
          for i in {1..24}; do
            http_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "http://${PUBLIC_IP}:${EXTERNAL_PORT}/votacion") || true
            if [[ "${http_code:-}" == "200" ]]; then
              echo "Service OK (${http_code})"
              exit 0
            fi
            echo "Retry $i/24 - code=${http_code:-timeout}"
            sleep 5
          done
          echo "Health-check failed, dumping container logs"
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" \
            "docker logs --tail 200 ${{ env.CONTAINER_NAME }}"
          exit 1
