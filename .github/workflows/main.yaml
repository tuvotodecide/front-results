name: CI & CD

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - "tests/**"
      - "cypress/**"
      - "cypress.config.ts"
      - "middleware.ts"
      - "eslint.config.js"
      - "next.config.ts"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tools/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "src/**"
      - "public/**"
      - "tests/**"
      - "cypress/**"
      - "cypress.config.ts"
      - "middleware.ts"
      - "eslint.config.js"
      - "next.config.ts"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tools/**"
      - ".github/workflows/**"

env:
  BUILD_PLATFORMS: linux/amd64

jobs:
  module-tests:
    name: Frontend - Module tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify module mapping
        if: ${{ !cancelled() }}
        run: pnpm test:modules:check

      - name: Run lint
        if: ${{ !cancelled() }}
        run: pnpm lint

      - name: Run typecheck
        if: ${{ !cancelled() }}
        run: pnpm typecheck

      - name: Run Cypress lint
        if: ${{ !cancelled() }}
        run: pnpm lint:cypress

      - name: Run Cypress typecheck
        if: ${{ !cancelled() }}
        run: pnpm typecheck:cypress

      - name: Check focused or skipped active tests
        if: ${{ !cancelled() }}
        run: pnpm check:no-focused-tests

      - name: Run build
        if: ${{ !cancelled() }}
        run: pnpm build

      - name: Run unit coverage
        if: ${{ !cancelled() }}
        run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin-coverage
          path: coverage/
          if-no-files-found: warn

      - name: Run dependency checks
        if: ${{ !cancelled() }}
        run: pnpm check:dependencies

      - name: Run module tests - General configuration, hooks and state
        if: ${{ !cancelled() }}
        run: pnpm test:module:general

      - name: Run module tests - Authentication and administrative access
        if: ${{ !cancelled() }}
        run: pnpm test:module:auth-access

      - name: Run module tests - Institutional applications and approvals
        if: ${{ !cancelled() }}
        run: pnpm test:module:applications

      - name: Run module tests - Election dashboard and listing
        if: ${{ !cancelled() }}
        run: pnpm test:module:election-dashboard

      - name: Run module tests - Election creation and configuration
        if: ${{ !cancelled() }}
        run: pnpm test:module:election-config

      - name: Run module tests - Positions, options, candidates and referendum
        if: ${{ !cancelled() }}
        run: pnpm test:module:election-options

      - name: Run module tests - Electoral register management
        if: ${{ !cancelled() }}
        run: pnpm test:module:register

      - name: Run module tests - Election review and official publication
        if: ${{ !cancelled() }}
        run: pnpm test:module:publication

      - name: Run module tests - Active election status and ballot
        if: ${{ !cancelled() }}
        run: pnpm test:module:active-election

      - name: Run module tests - Election results and public view
        if: ${{ !cancelled() }}
        run: pnpm test:module:results

      - name: Run module tests - Participation history and analytics
        if: ${{ !cancelled() }}
        run: pnpm test:module:participation

      - name: Run module tests - News and notifications
        if: ${{ !cancelled() }}
        run: pnpm test:module:notifications

      - name: Verify Cypress binary
        if: ${{ !cancelled() }}
        run: pnpm cypress:verify

      - name: Start frontend for Cypress
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          pnpm exec next start -H 127.0.0.1 -p 3000 > next-cypress.log 2>&1 &
          echo $! > next-cypress.pid
          for i in {1..90}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat next-cypress.log
          exit 1

      - name: Run Cypress tests - Authentication and administrative access
        if: ${{ !cancelled() }}
        env:
          CYPRESS_BASE_URL: http://127.0.0.1:3000
        run: pnpm cypress:module:auth-access

      - name: Run Cypress tests - Institutional applications and approvals
        if: ${{ !cancelled() }}
        env:
          CYPRESS_BASE_URL: http://127.0.0.1:3000
        run: pnpm cypress:module:applications

      - name: Run Cypress tests - Election creation and configuration
        if: ${{ !cancelled() }}
        env:
          CYPRESS_BASE_URL: http://127.0.0.1:3000
        run: pnpm cypress:module:election-config

      - name: Run Cypress tests - Electoral register management
        if: ${{ !cancelled() }}
        env:
          CYPRESS_BASE_URL: http://127.0.0.1:3000
        run: pnpm cypress:module:register

      - name: Run Cypress tests - Election review and official publication
        if: ${{ !cancelled() }}
        env:
          CYPRESS_BASE_URL: http://127.0.0.1:3000
        run: pnpm cypress:module:publication

      - name: Run Cypress tests - Election results and public view
        if: ${{ !cancelled() }}
        env:
          CYPRESS_BASE_URL: http://127.0.0.1:3000
        run: pnpm cypress:module:results

      - name: Upload Cypress evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-cypress-evidence
          path: |
            next-cypress.log
            cypress/screenshots/
            cypress/videos/
            cypress/results/
          if-no-files-found: ignore

      - name: Stop frontend server
        if: always()
        shell: bash
        run: |
          if [[ -f next-cypress.pid ]]; then
            kill "$(cat next-cypress.pid)" || true
          fi

      - name: Frontend module validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Frontend module tests"
            echo ""
            echo "The frontend automated battery ran in one job with visible Vitest and Cypress module steps."
            echo ""
            echo "Cypress base URL: `http://127.0.0.1:3000`"
            echo "Coverage HTML report path: `coverage/index.html`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build & Push Docker image
    needs: module-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: devops_aws
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPO: ${{ vars.ECR_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select env & image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "▶️ Build in PROD"
            echo "${{ vars.ENV_PROD }}" > .env
            echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "alias_tag=prod" >> $GITHUB_OUTPUT
          else
            echo "▶️ Build in DEV"
            echo "${{ vars.ENV_DEV }}" > .env
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "alias_tag=dev" >> $GITHUB_OUTPUT
          fi
          echo "⎿ wrote .env with tag: $(cat $GITHUB_OUTPUT)"

      - name: Set up QEMU (binfmt)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:v0.12.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ env.BUILD_PLATFORMS }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.alias_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.alias_tag }}
          cache-to: type=inline

  deploy-dev:
    name: Deploy to Hetzner (dev) via SSH
    needs: build
    if: github.event_name == 'push' && github.ref_type != 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: devops_aws
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPO: ${{ vars.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      PUBLIC_URL: ${{ vars.PUBLIC_URL }}
      EXTERNAL_PORT: ${{ vars.EXTERNAL_PORT_DEV }}
      CONTAINER_NAME: yocustodio-app-dev
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ vars.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy container via SSH
        shell: bash
        run: |
          set -euo pipefail
          ECR_TOKEN=$(aws ecr get-login-password --region "${{ env.AWS_REGION }}")
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" bash -s << ENDSSH
          set -euo pipefail
          echo "${ECR_TOKEN}" | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          docker pull --quiet "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          docker run -d \\
            --name ${{ env.CONTAINER_NAME }} \\
            -p "${{ env.EXTERNAL_PORT }}:3000" \\
            --restart unless-stopped \\
            "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker network connect results-net ${{ env.CONTAINER_NAME }} || true
          docker image prune -f
          ENDSSH

      - name: Health check loop
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking ${PUBLIC_URL}"
          for i in {1..24}; do
            http_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "${PUBLIC_URL}") || true
            if [[ "${http_code:-}" == "200" ]]; then
              echo "Service OK (${http_code})"
              exit 0
            fi
            echo "Retry $i/24 - code=${http_code:-timeout}"
            sleep 5
          done
          echo "Health-check failed, dumping container logs"
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" \
            "docker logs --tail 200 ${{ env.CONTAINER_NAME }}"
          exit 1

  deploy-prod:
    name: Deploy to Hetzner (prod) via SSH
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: devops_aws
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPO: ${{ vars.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      PUBLIC_URL: ${{ vars.PUBLIC_URL_PROD }}
      EXTERNAL_PORT: ${{ vars.EXTERNAL_PORT }}
      CONTAINER_NAME: yocustodio-app
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ vars.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy container via SSH
        shell: bash
        run: |
          set -euo pipefail
          ECR_TOKEN=$(aws ecr get-login-password --region "${{ env.AWS_REGION }}")
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" bash -s << ENDSSH
          set -euo pipefail
          echo "${ECR_TOKEN}" | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          docker pull --quiet "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          docker run -d \\
            --name ${{ env.CONTAINER_NAME }} \\
            -p "${{ env.EXTERNAL_PORT }}:3000" \\
            --restart unless-stopped \\
            "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker network connect results-net ${{ env.CONTAINER_NAME }} || true
          docker image prune -f
          ENDSSH

      - name: Health check loop
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking ${PUBLIC_URL}"
          for i in {1..24}; do
            http_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "${PUBLIC_URL}") || true
            if [[ "${http_code:-}" == "200" ]]; then
              echo "Service OK (${http_code})"
              exit 0
            fi
            echo "Retry $i/24 - code=${http_code:-timeout}"
            sleep 5
          done
          echo "Health-check failed, dumping container logs"
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" \
            "docker logs --tail 200 ${{ env.CONTAINER_NAME }}"
          exit 1

  frontend-metrics:
    name: Frontend metrics
    needs:
      - module-tests
      - build
      - deploy-dev
      - deploy-prod
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate frontend metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm metrics:frontend

      - name: Upload frontend metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin-metrics
          path: frontend-admin-metrics.json
          if-no-files-found: warn
