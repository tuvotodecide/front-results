name: CI & CD

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - "tests/**"
      - "cypress/**"
      - "cypress.config.ts"
      - "middleware.ts"
      - "eslint.config.js"
      - "next.config.ts"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tools/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "public/**"
      - "tests/**"
      - "cypress/**"
      - "cypress.config.ts"
      - "middleware.ts"
      - "eslint.config.js"
      - "next.config.ts"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tools/**"
      - ".github/workflows/**"

env:
  BUILD_PLATFORMS: linux/amd64

jobs:
  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Cypress lint
        run: pnpm lint:cypress

      - name: Cypress typecheck
        run: pnpm typecheck:cypress

      - name: Check focused or skipped active tests
        run: pnpm check:no-focused-tests

  frontend-auth-permissions:
    name: Frontend flow - auth and permissions
    needs: frontend-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Auth and permissions tests
        run: pnpm test:flow:auth-permissions

  frontend-approvals:
    name: Frontend flow - approvals
    needs: frontend-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approvals tests
        run: pnpm test:flow:approvals

  frontend-election-management:
    name: Frontend flow - election management
    needs: frontend-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Election management tests
        run: pnpm test:flow:election-management

  frontend-padron-publication:
    name: Frontend flow - padron and publication
    needs: frontend-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Padron and publication tests
        run: pnpm test:flow:padron-publication

  frontend-results-reports:
    name: Frontend flow - results and reports
    needs: frontend-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Results and reports tests
        run: pnpm test:flow:results-reports

  frontend-cypress-smoke:
    name: Frontend Cypress smoke
    needs: frontend-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Cypress binary
        run: pnpm cypress:verify

      - name: Start Next application
        shell: bash
        run: |
          pnpm exec next dev -H 127.0.0.1 -p 3000 > next-smoke.log 2>&1 &
          echo $! > next-smoke.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat next-smoke.log
          exit 1

      - name: Cypress smoke tests
        env:
          CYPRESS_BASE_URL: http://127.0.0.1:3000
        run: pnpm test:cypress:smoke

      - name: Stop Next application
        if: always()
        shell: bash
        run: |
          if [[ -f next-smoke.pid ]]; then
            kill "$(cat next-smoke.pid)" || true
          fi

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-smoke-screenshots
          path: cypress/screenshots/
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-smoke-videos
          path: cypress/videos/
          if-no-files-found: ignore

  frontend-coverage-build:
    name: Frontend coverage and build
    needs:
      - frontend-auth-permissions
      - frontend-approvals
      - frontend-election-management
      - frontend-padron-publication
      - frontend-results-reports
      - frontend-cypress-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Dependency checks
        run: pnpm check:dependencies

      - name: Publish validation summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Frontend admin validations by flow"
            echo ""
            echo "| Validation | Command |"
            echo "|---|---|"
            echo "| Quality | \`pnpm lint && pnpm typecheck && pnpm lint:cypress && pnpm typecheck:cypress && pnpm check:no-focused-tests\` |"
            echo "| Auth and permissions | \`pnpm test:flow:auth-permissions\` |"
            echo "| Approvals | \`pnpm test:flow:approvals\` |"
            echo "| Election management | \`pnpm test:flow:election-management\` |"
            echo "| Padron and publication | \`pnpm test:flow:padron-publication\` |"
            echo "| Results and reports | \`pnpm test:flow:results-reports\` |"
            echo "| Cypress smoke | \`pnpm test:cypress:smoke\` |"
            echo "| Coverage | \`pnpm test:coverage\` |"
            echo "| Build | \`pnpm build\` |"
            echo "| Dependency checks | \`pnpm check:dependencies\` |"
            echo ""
            echo "Coverage HTML report path: \`coverage/index.html\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin-coverage
          path: coverage/
          if-no-files-found: warn

  build:
    name: Build & Push Docker image
    needs: frontend-coverage-build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: devops_aws
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPO: ${{ vars.ECR_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select env & image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "▶️ Build in PROD"
            echo "${{ vars.ENV_PROD }}" > .env
            echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "alias_tag=prod" >> $GITHUB_OUTPUT
          else
            echo "▶️ Build in DEV"
            echo "${{ vars.ENV_DEV }}" > .env
            echo "image_tag=latest" >> $GITHUB_OUTPUT
            echo "alias_tag=dev" >> $GITHUB_OUTPUT
          fi
          echo "⎿ wrote .env with tag: $(cat $GITHUB_OUTPUT)"

      - name: Set up QEMU (binfmt)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:v0.12.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ env.BUILD_PLATFORMS }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.alias_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.alias_tag }}
          cache-to: type=inline

  deploy-dev:
    name: Deploy to Hetzner (dev) via SSH
    needs: build
    if: github.event_name == 'push' && github.ref_type != 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: devops_aws
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPO: ${{ vars.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      PUBLIC_URL: ${{ vars.PUBLIC_URL }}
      EXTERNAL_PORT: ${{ vars.EXTERNAL_PORT_DEV }}
      CONTAINER_NAME: yocustodio-app-dev
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ vars.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy container via SSH
        shell: bash
        run: |
          set -euo pipefail
          ECR_TOKEN=$(aws ecr get-login-password --region "${{ env.AWS_REGION }}")
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" bash -s << ENDSSH
          set -euo pipefail
          echo "${ECR_TOKEN}" | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          docker pull --quiet "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          docker run -d \\
            --name ${{ env.CONTAINER_NAME }} \\
            -p "${{ env.EXTERNAL_PORT }}:3000" \\
            --restart unless-stopped \\
            "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker network connect results-net ${{ env.CONTAINER_NAME }} || true
          docker image prune -f
          ENDSSH

      - name: Health check loop
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking ${PUBLIC_URL}"
          for i in {1..24}; do
            http_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "${PUBLIC_URL}") || true
            if [[ "${http_code:-}" == "200" ]]; then
              echo "Service OK (${http_code})"
              exit 0
            fi
            echo "Retry $i/24 - code=${http_code:-timeout}"
            sleep 5
          done
          echo "Health-check failed, dumping container logs"
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" \
            "docker logs --tail 200 ${{ env.CONTAINER_NAME }}"
          exit 1

  deploy-prod:
    name: Deploy to Hetzner (prod) via SSH
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: devops_aws
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPO: ${{ vars.ECR_REPOSITORY }}
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      PUBLIC_URL: ${{ vars.PUBLIC_URL_PROD }}
      EXTERNAL_PORT: ${{ vars.EXTERNAL_PORT }}
      CONTAINER_NAME: yocustodio-app
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ vars.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy container via SSH
        shell: bash
        run: |
          set -euo pipefail
          ECR_TOKEN=$(aws ecr get-login-password --region "${{ env.AWS_REGION }}")
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" bash -s << ENDSSH
          set -euo pipefail
          echo "${ECR_TOKEN}" | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          docker pull --quiet "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          docker run -d \\
            --name ${{ env.CONTAINER_NAME }} \\
            -p "${{ env.EXTERNAL_PORT }}:3000" \\
            --restart unless-stopped \\
            "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
          docker network connect results-net ${{ env.CONTAINER_NAME }} || true
          docker image prune -f
          ENDSSH

      - name: Health check loop
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking ${PUBLIC_URL}"
          for i in {1..24}; do
            http_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "${PUBLIC_URL}") || true
            if [[ "${http_code:-}" == "200" ]]; then
              echo "Service OK (${http_code})"
              exit 0
            fi
            echo "Retry $i/24 - code=${http_code:-timeout}"
            sleep 5
          done
          echo "Health-check failed, dumping container logs"
          ssh "${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}" \
            "docker logs --tail 200 ${{ env.CONTAINER_NAME }}"
          exit 1

  frontend-metrics:
    name: Frontend metrics
    needs:
      - frontend-quality
      - frontend-coverage-build
      - frontend-cypress-smoke
      - build
      - deploy-dev
      - deploy-prod
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate frontend metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm metrics:frontend

      - name: Upload frontend metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin-metrics
          path: frontend-admin-metrics.json
          if-no-files-found: warn
